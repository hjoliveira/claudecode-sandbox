# Docker Compose for Claude Code Sandbox
#
# Usage:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   docker compose run --rm claude
#
# Customise ALLOWED_DOMAINS and the volume mount below for your project.

services:
  claude:
    build: .
    stdin_open: true     # -i
    tty: true            # -t
    cap_add:
      - NET_ADMIN        # required for iptables egress rules
    cap_drop:
      - ALL              # drop everything else
    security_opt:
      - no-new-privileges:true
    environment:
      - ANTHROPIC_API_KEY
      - ALLOWED_DOMAINS=api.anthropic.com
      - DNS_SERVER=8.8.8.8
      - VERBOSE=0
    volumes:
      - ./my-project:/home/sandbox/project
    tmpfs:
      - /tmp:size=512M
